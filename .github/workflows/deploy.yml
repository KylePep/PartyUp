name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: partyup
          POSTGRES_PASSWORD: partyup
          POSTGRES_DB: partyup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        run: dotnet restore
      - name: Test
        run: dotnet test apps/tests/PartyUp.Api.Tests --no-restore
        env:
          Jwt__Key: "ci-test-jwt-key-not-for-production-use-minimum-32c"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/kylepep/partyup:latest
            ghcr.io/kylepep/partyup:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_KEY: ${{ secrets.JWT_KEY }}
          RAWG_API_KEY: ${{ secrets.RAWG_API_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DB_PASSWORD,JWT_KEY,RAWG_API_KEY
          script: |
            cd /opt/partyup
            {
              echo "DB_PASSWORD=$DB_PASSWORD"
              echo "ConnectionStrings__DefaultConnection=Host=partyup-db;Database=partyup;Username=partyup;Password=$DB_PASSWORD"
              echo "Jwt__Key=$JWT_KEY"
              echo "Rawg__ApiKey=$RAWG_API_KEY"
              echo "ASPNETCORE_ENVIRONMENT=Production"
            } > .env
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
